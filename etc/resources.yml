#
# Storage section
#
# Here you can add the configuration of your
# storage units. You can write it as followed:
#
#   storage:
#     hdd:
#       driver: file
#       root: /mnt/pool-vm-hdd
#     ssd:
#       driver: file
#       root: /mnt/pool-vm-ssd

storage:
  default:
    driver: file
    root: /var/lib/ovm/storage-pools/default



