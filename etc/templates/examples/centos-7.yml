uid: centos-7
name: CentOS 7

vcpu: 1
memory: 128

metadata:
  os_type: linux
  os_name: CentOS
  os_version: 7

main_disk:
  path: /mnt/pool-templates/centos-7.qcow2
  image_bus: virtio
  image_dev: vda
  image_format: qcow2
  image_size: 8

main_interface:
  model: virtio

abilities:
  resizeDisk:
    script: linux/resize.sh
    params: ["{vol_path}", "/dev/centos/lv_root"]

post_install:
  - path: linux/setcontext.sh
    params: ["{diskpath}", "centos-7", "{configuration}", "/dev/centos/lv_root"]
