id: centos-7
name: CentOS 7
os_type: linux
os_name: CentOS
os_version: 7

vcpu: 1
memory: 128

main_disk:
  path: /mnt/pool-templates/centos-7.qcow2
  image_bus: virtio
  image_dev: vda
  image_format: qcow2
  image_size: 8

main_interface:
  model: virtio

abilities:
  resizeDisk:
    script: linux/resize-qcow2.sh
    params: ["centos-7", "{vol_path}"]

post-install:
  - path: linux/finish-vm.sh
    params: ["{diskpath}", "centos-7"]