# ID of the template
id: debian-wheezy

# Name
name: Debian Wheezy

# OS information
os_type: linux
os_name: Debian
os_version: 7

# Default velues for RAM and CPU count
vcpu: 1
memory: 128

# Choose the main disk
#
# path
# bus : virtio, ide...
# dev
# type
main_disk:
  path: /mnt/pool-templates/debian-wheezy.qcow2
  image_bus: virtio
  image_dev: vda
  image_format: qcow2
  image_size: 8

# Main interface
main_interface:
  model: virtio

# Abilities
abilities:
  resizeDisk:
    script: linux/resize.sh
    params: ["{vol_path}", "/dev/debian/root"]

# Post install scripts
post-install:
  - path: linux/setcontext.sh
    params: ["{diskpath}", "debian-7", "{configuration}", "/dev/debian/root"]