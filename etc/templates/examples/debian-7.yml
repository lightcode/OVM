uid: debian-wheezy
name: Debian Wheezy

vcpu: 1
memory: 128

metadata:
  os_type: linux
  os_name: Debian
  os_version: 7

main_disk:
  path: /mnt/pool-templates/debian-wheezy.qcow2
  image_bus: virtio
  image_dev: vda
  image_format: qcow2
  image_size: 8

main_interface:
  model: virtio

abilities:
  resizeDisk:
    script: linux/resize.sh
    params: ["{vol_path}", "/dev/debian/root"]

post-install:
  - path: linux/setcontext.sh
    params: ["{diskpath}", "debian-7", "{configuration}", "/dev/debian/root"]