uid: centos-6
name: CentOS 6

vcpu: 1
memory: 128

metadata:
  os_type: linux
  os_name: CentOS
  os_version: 6

main_disk:
  path: /mnt/pool-templates/centos-6.qcow2
  image_bus: virtio
  image_dev: vda
  image_format: qcow2
  image_size: 8

main_interface:
  model: virtio

abilities:
  resizeDisk:
    script: linux/resize.sh
    params: ["{vol_path}", "/dev/vg_centos/lv_root"]

post_install:
  - path: linux/setcontext.sh
    params: ["{diskpath}", "centos-6", "{configuration}", "/dev/vg_centos/lv_root"]